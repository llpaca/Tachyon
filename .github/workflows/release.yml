name: Release

on:
  push:

jobs:
  release:
    if: contains(github.event.head_commit.message, '@release')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt update
          sudo apt install -y build-essential

      - run: |
          make clean
          make

      - uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: main